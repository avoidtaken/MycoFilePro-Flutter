name: mycofile_pro
description: "MycoFile Pro - mycology grow tracker, offline-first."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  fl_chart: ^0.68.0
  image_picker: ^1.1.2
  share_plus: ^9.0.0
  csv: ^6.0.0
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
