workflows:
  ios-workflow:
    name: MycoFile Pro iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: "com.mycofile.pro"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Regenerate missing platform folders
        script: |
          flutter create --platforms=ios . --org com.mycofile --project-name mycofile_pro
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ios unsigned
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true